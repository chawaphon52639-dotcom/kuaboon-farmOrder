        // Helper: Compress Image in Browser before uploading (Ultra Fast Uploads)
        async function compressImage(fileOrDataUrl, maxWidth = 800, maxHeight = 800, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                    resolve(compressedDataUrl);
                };
                img.onerror = (err) => reject(err);

                if (typeof fileOrDataUrl === 'string') {
                    img.src = fileOrDataUrl;
                } else if (fileOrDataUrl instanceof File || fileOrDataUrl instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = (e) => { img.src = e.target.result; };
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(fileOrDataUrl);
                } else {
                    reject(new Error("Invalid image source"));
                }
            });
        }

        // Helper: Convert DataURL to Compressed Firebase Storage URL
        async function uploadImageToStorage(dataUrl, folderName) {
            if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl;
            try {
                // Compress first
                const compressedUrl = await compressImage(dataUrl, 800, 800, 0.7);
                const filename = `${folderName}/${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const ref = storage.ref().child(filename);
                await ref.putString(compressedUrl, 'data_url');
                const downloadUrl = await ref.getDownloadURL();
                return downloadUrl;
            } catch (error) {
                console.error("Storage upload error:", error);
                return dataUrl; // Fallback to raw if upload fails
            }
        }

        function bahtText(num) {
            if (!num || isNaN(num) || num === 0) return 'ศูนย์บาทถ้วน';
            num = Math.round(num * 100) / 100;
            const digits = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
            const positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
            
            let [baht, satang] = num.toString().split('.');
            let bahtStr = '';
            
            let len = baht.length;
            for (let i = 0; i < len; i++) {
                let digit = parseInt(baht[i]);
                let pos = len - i - 1;
                if (digit !== 0) {
                    if (pos === 1 && digit === 1) bahtStr += 'สิบ';
                    else if (pos === 1 && digit === 2) bahtStr += 'ยี่สิบ';
                    else if (pos === 0 && digit === 1 && len > 1) bahtStr += 'เอ็ด';
                    else bahtStr += digits[digit] + positions[pos % 6];
                }
            }
            bahtStr += 'บาท';
            if (!satang || parseInt(satang) === 0) {
                bahtStr += 'ถ้วน';
            } else {
                let s = parseInt(satang.padEnd(2, '0').slice(0, 2));
                if (s > 0) {
                    let ten = Math.floor(s / 10);
                    let unit = s % 10;
                    if (ten === 1) bahtStr += 'สิบ';
                    else if (ten === 2) bahtStr += 'ยี่สิบ';
                    else if (ten > 2) bahtStr += digits[ten] + 'สิบ';
                    
                    if (unit === 1 && ten > 0) bahtStr += 'เอ็ด';
                    else if (unit > 0) bahtStr += digits[unit];
                    bahtStr += 'สตางค์';
                } else {
                    bahtStr += 'ถ้วน';
                }
            }
            return bahtStr;
        }

                }

            };

            const addToCart = (product) => {
                if (product.stock <= 0) return;
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    if (existing.qty >= product.stock) return;
                    setCart(cart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item));

                        return newQty > 0 ? { ...item, qty: newQty } : null;

                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                                                                required
                                                                value={newStaffPin}
                                                                onChange={e => setNewStaffPin(e.target.value)}
                                                                className="w-full sm:w-28 p-2 border rounded-xl text-center font-mono font-bold"
                                                            />
                                                            <button type="submit" className="w-full sm:w-auto px-4 py-2 bg-farm-800 text-white font-bold rounded-xl shadow whitespace-nowrap">
                                                                + เพิ่มพนักงาน
                                                            </button>
                                                        </form>
                                                    )}

                                                    <div className="divide-y divide-slate-100 text-xs">
                                                        {staffList.map((staff, idx) => (
                                                            <div key={staff.id} className="py-2.5 flex items-center justify-between">
                                                                <div>
                                                                    <span className="font-bold text-slate-900">{idx + 1}. {staff.name}</span>
                                                                    <span className="text-slate-400 font-mono ml-2">(PIN: {staff.pin})</span>
                                                                </div>
                                                                <button onClick={() => {
                                                                    const updated = staffList.filter(s => s.id !== staff.id);
                                                                    setStaffList(updated);
                                                                    db.collection('settings').doc('farm_config').set({ staffList: updated }, { merge: true });
                                                                    showToast('🗑️ ลบพนักงาน', 'ลบข้อมูลพนักงานเรียบร้อยแล้ว', 'info');
                                                                }} className="text-rose-500 font-bold hover:underline">
                                                                    ลบ
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {(adminTab === 'active' || adminTab === 'completed') && (
                                            <div className="space-y-4">
                                                {orders.filter(o => adminTab === 'completed' ? o.status === 'completed' : o.status !== 'completed').map(order => (
                                                    <div key={order.id} className="bg-white p-4 sm:p-5 rounded-3xl border border-slate-200 shadow-sm space-y-3">
                                                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 border-b pb-3">
                                                            <div>
                                                                <div className="flex items-center gap-2">
                                                                    <span className="font-extrabold text-slate-900 text-sm">{order.docNo}</span>
                                                                    <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${order.isCredit ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800'}`}>
                                                                        {order.isCredit ? 'เครดิต' : 'จ่ายสด/โอน'}
                                                                    </span>
                                                                </div>
                                                                <p className="text-slate-400 text-[11px]">{order.date} • คุณ {order.customerName} ({order.phone})</p>
                                                            </div>

                                                            <div className="flex items-center gap-2 w-full sm:w-auto">
                                                                <select 
                                                                    value={order.status} 
                                                                    onChange={e => updateOrderStatus(order.id, e.target.value)}
                                                                    className="text-xs p-2 border border-slate-300 rounded-xl font-bold bg-slate-50 outline-none"
                                                                >
                                                                    <option value="pending">⏳ ได้รับออเดอร์</option>
                                                                    <option value="packing">🥬 กำลังแพ็คผักสด</option>
                                                                    <option value="shipping">🚚 กำลังจัดส่ง</option>
                                                                    <option value="completed">✅ ส่งสำเร็จแล้ว</option>
                                                                </select>

                                                                <button 
                                                                    onClick={() => setSelectedOrderDetails(order)} 
                                                                    className="px-3 py-2 bg-farm-800 hover:bg-farm-900 text-white text-xs font-bold rounded-xl shadow whitespace-nowrap"
                                                                >
                                                                    📄 พิมพ์บิล A4
                                                                </button>
                                                            </div>
                                                        </div>

                                                        {/* Items & Address */}
                                                        <div className="text-xs space-y-1">
                                                            {order.items && order.items.map((it, idx) => (
                                                                <div key={idx} className="flex justify-between text-slate-600">
                                                                    <span>• {it.name} x {it.qty} {it.unit}</span>
                                                                    <span>฿{it.price * it.qty}</span>
                                                                </div>
                                                            ))}
                                                            <div className="flex justify-between font-extrabold text-slate-900 pt-1 border-t">
                                                                <span>ยอดเงินรวม</span>
                                                                <span className="text-farm-800">฿{order.total}</span>
                                                            </div>
                                                        </div>

                                                        {order.address && (
                                                            <p className="text-[11px] text-slate-500 bg-slate-50 p-2 rounded-xl">
                                                                📍 <strong>ที่อยู่ส่ง:</strong> {order.address} {order.mapsUrl && <a href={order.mapsUrl} target="_blank" rel="noreferrer" className="text-blue-600 underline ml-1">เปิดแผนที่</a>}
                                                            </p>
                                                        )}

                                                        {/* Proof Upload */}
                                                        <div className="pt-2 border-t flex flex-col sm:flex-row items-center justify-between gap-2 text-xs">
                                                            <div className="w-full sm:w-auto">
                                                                <label className="font-bold text-slate-700 block mb-0.5">📸 อัปโหลดรูปหลักฐานการจัดส่ง:</label>
                                                                <input 
                                                                    type="file" 
                                                                    accept="image/*" 
                                                                    onChange={e => handleUploadProofImage(order.id, e.target.files[0])}
                                                                    className="text-[10px] text-slate-500"
                                                                />
                                                            </div>
                                                            {order.slipImage && (
                                                                <a href={order.slipImage} target="_blank" rel="noreferrer" className="text-blue-600 font-bold hover:underline text-[11px]">
                                                                    🖼️ ดูสลิปโอนเงินลูกค้า
                                                                </a>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {selectedOrderDetails && (
                        <div className="fixed inset-0 z-50 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-2 sm:p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-3xl rounded-3xl p-6 sm:p-8 space-y-6 shadow-2xl my-auto">
                                <div className="flex justify-between items-center no-print border-b pb-3">
                                    <h3 className="font-extrabold text-slate-900 text-base">📄 ตัวอย่างเอกสาร A4</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => window.print()} className="px-4 py-2 bg-farm-800 text-white font-bold text-xs rounded-xl shadow">
                                            🖨️ พิมพ์ / บันทึก PDF
                                        </button>
                                        <button onClick={() => setSelectedOrderDetails(null)} className="px-3 py-2 bg-slate-200 text-slate-700 font-bold text-xs rounded-xl hover:bg-slate-300">
                                            ปิด
                                        </button>
                                    </div>
                                </div>

                                {/* Printable Area */}
                                <div id="printable-area" className="space-y-6 text-slate-800 text-xs">
                                    <div className="flex justify-between items-start border-b-2 border-slate-900 pb-4">
                                        <div>
                                            <h1 className="text-xl font-extrabold text-slate-900">{farmName}</h1>
                                            <p className="mt-1">{farmAddress}</p>
                                            <p>โทร: {farmPhone} | เลขประจำตัวผู้เสียภาษี: {taxId}</p>
                                        </div>
                                        <div className="text-right">
                                            <h2 className="text-lg font-black text-slate-900">
                                                {selectedOrderDetails.isCredit ? 'ใบส่งสินค้า / ใบแจ้งหนี้' : 'ใบเสร็จรับเงิน'}
                                            </h2>
                                            <p className="font-mono font-bold mt-1 text-slate-600">{selectedOrderDetails.docNo}</p>
                                            <p className="text-[11px] text-slate-500">วันที่: {selectedOrderDetails.date}</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-3 rounded-xl space-y-1">
                                        <p><strong>ชื่อลูกค้า / ร้านค้า:</strong> คุณ {selectedOrderDetails.customerName}</p>
                                        <p><strong>เบอร์โทรศัพท์:</strong> {selectedOrderDetails.phone}</p>
                                        <p><strong>ที่อยู่จัดส่ง:</strong> {selectedOrderDetails.address}</p>
                                    </div>

                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b-2 border-slate-300 bg-slate-100">
                                                <th className="py-2 px-2">ลำดับ</th>
                                                <th className="py-2 px-2">รายการผักปลอดสาร / สินค้า</th>
                                                <th className="py-2 px-2 text-center">จำนวน</th>
                                                <th className="py-2 px-2 text-right">ราคา/หน่วย</th>
                                                <th className="py-2 px-2 text-right">จำนวนเงิน</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {selectedOrderDetails.items && selectedOrderDetails.items.map((it, idx) => (
                                                <tr key={idx}>
                                                    <td className="py-2 px-2 text-center">{idx + 1}</td>
                                                    <td className="py-2 px-2 font-bold">{it.name}</td>
                                                    <td className="py-2 px-2 text-center">{it.qty} {it.unit}</td>
                                                    <td className="py-2 px-2 text-right">฿{it.price}</td>
                                                    <td className="py-2 px-2 text-right font-bold">฿{it.price * it.qty}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot>
                                            <tr className="border-t-2 border-slate-900 font-bold">
                                                <td colSpan="4" className="py-2 px-2 text-right">ยอดเงินสุทธิ:</td>
                                                <td className="py-2 px-2 text-right text-base">฿{selectedOrderDetails.total}</td>
                                            </tr>
                                        </tfoot>
                                    </table>

                                    <div className="bg-slate-100 p-2.5 rounded-xl text-center font-bold">
                                        ({bahtText(selectedOrderDetails.total)})
                                    </div>

                                    <div className="grid grid-cols-3 gap-4 pt-10 text-center">
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">
                                                {selectedOrderDetails.isCredit ? 'ผู้รับสินค้า / ลูกค้า' : 'ผู้จ่ายเงิน / ลูกค้า'}
                                                <br/>
                                                <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                            </p>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">
                                                พนักงานจัดส่งสินค้า
                                                <br/>
                                                <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                            </p>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">
                                                {selectedOrderDetails.isCredit ? 'ผู้ส่งสินค้า / เกื้อบุญฟาร์ม' : 'ผู้รับเงิน / เกื้อบุญฟาร์ม'}
                                                <br/>
                                                <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 md:hidden z-20">
                        <div className="grid grid-cols-3 text-center py-2 text-[11px] font-bold">
                            <button onClick={() => setView('store')} className={`space-y-0.5 ${view === 'store' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">🥬</div>
                                <span>สั่งผักสด</span>
                            </button>
                            <button onClick={() => setView('tracking')} className={`space-y-0.5 ${view === 'tracking' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">🚚</div>
                                <span>ติดตาม</span>
                            </button>
                            <button onClick={() => setView('backoffice')} className={`space-y-0.5 ${view === 'backoffice' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">👤🔧</div>
                                <span>ปฏิบัติการ</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
