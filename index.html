        async function compressImageToBlob(fileOrDataUrl, maxWidth = 800, maxHeight = 800, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    canvas.toBlob((blob) => {
                        resolve({ blob: blob || null, dataUrl });
                    }, 'image/jpeg', quality);
                };
                img.onerror = () => reject(new Error("ไม่สามารถอ่านรูปภาพได้"));

                if (typeof fileOrDataUrl === 'string') {
                    img.src = fileOrDataUrl;
                } else if (fileOrDataUrl instanceof File || fileOrDataUrl instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = (e) => { img.src = e.target.result; };
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(fileOrDataUrl);
                } else {
                    reject(new Error("Invalid image source"));
                }
            });
        }

        async function uploadBlobToStorage(fileOrDataUrl, folderName, options = {}) {
            if (!fileOrDataUrl) return null;
            if (typeof fileOrDataUrl === 'string' && fileOrDataUrl.startsWith('http')) {
                return fileOrDataUrl;
            }

            const rawUpload = options.rawUpload || false;
            let blob = null;
            let dataUrlFallback = null;

            if (rawUpload && (fileOrDataUrl instanceof File || fileOrDataUrl instanceof Blob)) {
                blob = fileOrDataUrl;
            } else {
                try {
                    const compressed = await compressImageToBlob(fileOrDataUrl, options.maxWidth || 800, options.maxHeight || 800, options.quality || 0.8);
                    blob = compressed.blob;
                    dataUrlFallback = compressed.dataUrl;
                } catch (err) {
                    if (typeof fileOrDataUrl === 'string') return fileOrDataUrl;
                    throw err;
                }
            }

            try {
                const filename = `${folderName}/${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const ref = storage.ref().child(filename);
                
                const uploadTask = ref.put(blob, { contentType: 'image/jpeg' });
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Storage Timeout")), 4000)
                );
                
                const snapshot = await Promise.race([uploadTask, timeoutPromise]);
                const downloadUrl = await snapshot.ref.getDownloadURL();
                return downloadUrl;
            } catch (storageError) {
                console.warn("Storage upload fallback used inline DataURL:", storageError);
                return dataUrlFallback || (typeof fileOrDataUrl === 'string' ? fileOrDataUrl : null);
            }
        }

        function bahtText(num) {
            if (!num || isNaN(num) || num === 0) return 'ศูนย์บาทถ้วน';
            num = Math.round(num * 100) / 100;
            const digits = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
            const positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
            
            let [baht, satang] = num.toString().split('.');
            let bahtStr = '';
            
            let len = baht.length;
            for (let i = 0; i < len; i++) {
                let digit = parseInt(baht[i]);
                let pos = len - i - 1;
                if (digit !== 0) {
                    if (pos === 1 && digit === 1) bahtStr += 'สิบ';
                    else if (pos === 1 && digit === 2) bahtStr += 'ยี่สิบ';
                    else if (pos === 0 && digit === 1 && len > 1) bahtStr += 'เอ็ด';
                    else bahtStr += digits[digit] + positions[pos % 6];
                }
            }
            bahtStr += 'บาท';
            if (!satang || parseInt(satang) === 0) {
                bahtStr += 'ถ้วน';
            } else {
                let s = parseInt(satang.padEnd(2, '0').slice(0, 2));
                if (s > 0) {
                    let ten = Math.floor(s / 10);
                    let unit = s % 10;
                    if (ten === 1) bahtStr += 'สิบ';
                    else if (ten === 2) bahtStr += 'ยี่สิบ';
                    else if (ten > 2) bahtStr += digits[ten] + 'สิบ';
                    
                    if (unit === 1 && ten > 0) bahtStr += 'เอ็ด';
                    else if (unit > 0) bahtStr += digits[unit];
                    bahtStr += 'สตางค์';
                } else {
                    bahtStr += 'ถ้วน';
                }
            }
            return bahtStr;
        }

            const playLoudAlert = () => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new AudioContext();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') {
                        ctx.resume();
                    }

                    const now = ctx.currentTime;
                    const freqs = [523.25, 659.25, 783.99, 1046.50, 659.25, 1046.50];
                    freqs.forEach((freq, idx) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + idx * 0.15);
                        gain.gain.setValueAtTime(0.5, now + idx * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.15 + 0.35);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        
                        osc.start(now + idx * 0.15);
                        osc.stop(now + idx * 0.15 + 0.35);
                    });
                } catch (err) {

                    showToast('❌ ซิงค์ไม่สำเร็จ', 'กรุณาตรวจสอบสิทธิ์ Firestore Rules ใน Firebase Console', 'error');
                }
            };

            const totalSaladKg = roundStep(
                cart
                    .filter(item => item.category === 'salad')
                    .reduce((sum, item) => sum + item.qty, 0)
            );

            const isEligibleForWholesalePrice = customerType === 'wholesale' || totalSaladKg >= 5;

            const getItemPrice = (product) => {
                if (product.category === 'salad') {
                    return isEligibleForWholesalePrice ? product.priceWholesale : product.priceRetail;
                }
                return product.priceRetail;
            };

            const getStep = (product) => product.category === 'salad' ? 0.5 : 1;

            const addToCart = (product, initialQty = null) => {
                if (product.stock <= 0) return;
                const step = initialQty !== null ? initialQty : getStep(product);
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    const newQty = roundStep(existing.qty + step);
                    if (newQty > product.stock) {
                        showToast('⚠️ สต็อกไม่พอ', `ขณะนี้ ${product.name} มีสต็อกพร้อมส่ง ${product.stock} ${product.unit}`, 'error');
                        return;
                    }
                    setCart(cart.map(item => item.id === product.id ? { ...item, qty: newQty } : item));
                } else {
                    if (step > product.stock) {
                        showToast('⚠️ สต็อกไม่พอ', `ขณะนี้ ${product.name} มีสต็อกพร้อมส่ง ${product.stock} ${product.unit}`, 'error');
                        return;
                    }
                    setCart([...cart, { ...product, qty: step }]);
                }
            };

            const updateCartQty = (id, delta) => {
                const targetProduct = products.find(p => p.id === id);
                if (!targetProduct) return;
                const step = getStep(targetProduct) * Math.sign(delta);

                setCart(cart.map(item => {
                    if (item.id === id) {
                        const newQty = roundStep(item.qty + step);
                        if (newQty > targetProduct.stock) {
                            showToast('⚠️ สต็อกไม่พอ', `ไม่สามารถเพิ่มได้เกินสต็อกคงเหลือ (${targetProduct.stock} ${targetProduct.unit})`, 'error');
                            return item;
                        }
                        return newQty > 0 ? { ...item, qty: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const cartSubtotal = roundStep(cart.reduce((sum, item) => sum + (getItemPrice(item) * item.qty), 0));
            const shippingFee = 0;
            const cartTotal = cartSubtotal + shippingFee;

            const handleGetGpsLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const url = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                            setCustMapsUrl(url);
                        },
                        () => showToast('📍 ไม่สามารถดึง GPS ได้', 'กรุณาวางลิงก์ Google Maps โดยตรงในช่องใส่พิกัด', 'error')
                    );
                } else {
                    showToast('⚠️ ไม่รองรับ GPS', 'เบราว์เซอร์ของคุณน้าไม่รองรับการดึงพิกัดอัตโนมัติ', 'error');
                }
            };

            const handlePlaceOrder = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || isSubmitting) return;

                if (isCreditOrder || customerType === 'wholesale') {
                    const isApproved = wholesaleWhitelist.some(w => w.phone.replace(/[^0-9]/g, '') === custPhone.replace(/[^0-9]/g, ''));
                    if (!isApproved && isCreditOrder) {
                        showToast('⚠️ ไม่ได้รับสิทธิ์เครดิต', 'เบอร์โทรศัพท์นี้ยังไม่ได้รับอนุมัติสั่งซื้อแบบเครดิต กรุณาเลือกชำระแบบโอนเงินก่อนครับ', 'error');
                        return;

                if (!isCreditOrder && !slipPreview && !slipFile) {
                    showToast('📸 กรุณาแนบสลิป', 'กรุณาแนบรูปสลิปการโอนเงินเพื่อยืนยันการชำระเงิน', 'error');

                }

                setIsSubmitting(true);

                try {
                    let uploadedSlipUrl = null;
                    if (slipFile || slipPreview) {
                        uploadedSlipUrl = await uploadBlobToStorage(slipFile || slipPreview, 'payment_slips');
                    }

                    const todayStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
                    const yearNum = new Date().getFullYear();
                    const nextNum = String(orders.length + 1).padStart(3, '0');
                    const newDocNo = `${nextNum}/${todayStr}/${yearNum}`;
                    const orderId = `ORD-${Date.now()}`;

                    const newOrder = {
                        id: orderId,
                        docNo: newDocNo,
                        date: new Date().toLocaleString('th-TH'),
                        customerName: custName,
                        phone: custPhone,
                        address: custAddress,
                        mapsUrl: custMapsUrl,
                        paymentType: isCreditOrder ? 'credit' : 'promptpay',
                        isCredit: isCreditOrder,
                        items: cart.map(i => ({ id: i.id, name: i.name, qty: roundStep(i.qty), price: getItemPrice(i), unit: i.unit })),
                        subtotal: cartSubtotal,
                        shippingFee: shippingFee,
                        total: cartTotal,
                        status: 'pending',
                        slipImage: uploadedSlipUrl,
                        proofImage: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (isFirebaseConnected) {
                        await db.collection('orders').doc(orderId).set(newOrder);

                        const batch = db.batch();
                        cart.forEach(cItem => {
                            const pRef = db.collection('products').doc(cItem.id);
                            const currentProd = products.find(p => p.id === cItem.id);
                            if (currentProd) {
                                const newStock = Math.max(0, roundStep(currentProd.stock - cItem.qty));
                                batch.update(pRef, { stock: newStock });
                            }
                        });
                        await batch.commit();
                    } else {
                        setOrders(prev => [newOrder, ...prev]);
                        setProducts(prev => prev.map(p => {
                            const inC = cart.find(c => c.id === p.id);
                            return inC ? { ...p, stock: Math.max(0, roundStep(p.stock - inC.qty)) } : p;
                        }));
                    }

                    setCustName('');
                    setCustPhone('');
                    setCustAddress('');
                    setCustMapsUrl('');
                    setCart([]);
                    setShowCartDrawer(false);
                    setSlipPreview('');
                    setSlipFile(null);

                    if (window.confetti) {
                        window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

                    showToast('🎉 สั่งซื้อผักสดสำเร็จ!', `ส่งรายการคำสั่งซื้อเลขที่ ${newDocNo} เข้าสู่ระบบเรียบร้อยแล้ว`, 'success');
                } catch (err) {
                    console.error("Order submit error:", err);
                    showToast('❌ เกิดข้อผิดพลาด', 'ไม่สามารถบันทึกออเดอร์ได้', 'error');

                                        >
                                            <span>📥</span>
                                            <span>บันทึกไฟล์ PDF</span>
                                        </button>
                                        <button onClick={() => window.print()} className="px-4 py-2 bg-farm-800 hover:bg-farm-900 text-white font-bold text-xs rounded-xl shadow flex items-center gap-1.5 transition-all">
                                            <span>🖨️</span>
                                            <span>สั่งพิมพ์ (Print)</span>
                                        </button>
                                        <button onClick={() => setSelectedOrderDetails(null)} className="px-3 py-2 bg-slate-200 text-slate-700 font-bold text-xs rounded-xl hover:bg-slate-300">
                                            ปิด
                                        </button>
                                    </div>
                                </div>

                                {(() => {
                                    const isReceipt = selectedOrderDetails.forceDocType ? selectedOrderDetails.forceDocType === 'receipt' : !selectedOrderDetails.isCredit;
                                    return (
                                        <div id="printable-area" className="space-y-6 text-slate-800 text-xs">
                                            <div className="flex justify-between items-start border-b-2 border-slate-900 pb-4">
                                                <div>
                                                    <h1 className="text-xl font-extrabold text-slate-900">{farmName}</h1>
                                                    <p className="mt-1">{farmAddress}</p>
                                                    <p>โทร: {farmPhone} | เลขประจำตัวผู้เสียภาษี: {taxId}</p>
                                                </div>
                                                <div className="text-right">
                                                    <h2 className="text-lg font-black text-slate-900">
                                                        {isReceipt ? 'ใบเสร็จรับเงิน (Receipt)' : 'ใบส่งสินค้า / ใบแจ้งหนี้ (Delivery Note)'}
                                                    </h2>
                                                    <p className="font-mono font-bold mt-1 text-slate-600">{selectedOrderDetails.docNo}</p>
                                                    <p className="text-[11px] text-slate-500">วันที่: {selectedOrderDetails.date}</p>
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-3 rounded-xl space-y-1">
                                                <p><strong>ชื่อลูกค้า / ร้านค้า:</strong> คุณ {selectedOrderDetails.customerName}</p>
                                                <p><strong>เบอร์โทรศัพท์:</strong> {selectedOrderDetails.phone}</p>
                                                <p><strong>ที่อยู่จัดส่ง:</strong> {selectedOrderDetails.address}</p>
                                            </div>

                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="border-b-2 border-slate-300 bg-slate-100">
                                                        <th className="py-2 px-2">ลำดับ</th>
                                                        <th className="py-2 px-2">รายการผักปลอดสาร / สินค้า</th>
                                                        <th className="py-2 px-2 text-center">จำนวน</th>
                                                        <th className="py-2 px-2 text-right">ราคา/หน่วย</th>
                                                        <th className="py-2 px-2 text-right">จำนวนเงิน</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y">
                                                    {selectedOrderDetails.items && selectedOrderDetails.items.map((it, idx) => (
                                                        <tr key={idx}>
                                                            <td className="py-2 px-2 text-center">{idx + 1}</td>
                                                            <td className="py-2 px-2 font-bold">{it.name}</td>
                                                            <td className="py-2 px-2 text-center">{it.qty} {it.unit}</td>
                                                            <td className="py-2 px-2 text-right">฿{it.price}</td>
                                                            <td className="py-2 px-2 text-right font-bold">฿{it.price * it.qty}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                                <tfoot>
                                                    <tr className="border-t-2 border-slate-900 font-bold">
                                                        <td colSpan="4" className="py-2 px-2 text-right">ยอดเงินสุทธิ:</td>
                                                        <td className="py-2 px-2 text-right text-base">฿{selectedOrderDetails.total}</td>
                                                    </tr>
                                                </tfoot>
                                            </table>

                                            <div className="bg-slate-100 p-2.5 rounded-xl text-center font-bold">
                                                ({bahtText(selectedOrderDetails.total)})
                                            </div>

                                            <div className="grid grid-cols-3 gap-4 pt-10 text-center">
                                                <div className="space-y-6">
                                                    <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                                    <p className="text-[11px] font-bold">
                                                        {isReceipt ? 'ผู้จ่ายเงิน / ลูกค้า' : 'ผู้รับสินค้า / ลูกค้า'}
                                                        <br/>
                                                        <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                                    </p>
                                                </div>
                                                <div className="space-y-6">
                                                    <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                                    <p className="text-[11px] font-bold">
                                                        พนักงานจัดส่งสินค้า
                                                        <br/>
                                                        <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                                    </p>
                                                </div>
                                                <div className="space-y-6">
                                                    <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                                    <p className="text-[11px] font-bold">
                                                        {isReceipt ? 'ผู้รับเงิน / เกื้อบุญฟาร์ม' : 'ผู้ส่งสินค้า / เกื้อบุญฟาร์ม'}
                                                        <br/>
                                                        <span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span>
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="mt-6 p-3 bg-amber-50/80 border border-amber-200 rounded-xl text-amber-900 text-[11px] font-medium flex items-center gap-2">
                                                <span className="text-base">📌</span>
                                                <span><strong>หมายเหตุ:</strong> เอกสารฉบับนี้เป็นเอกสารอิเล็กทรอนิกส์ เอกสารฉบับจริงจะถูกจัดส่งไปพร้อมกับสินค้า</span>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    )}

                    {/* Product Edit Modal */}
                    {editingProductModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full space-y-5 shadow-2xl border my-auto">
                                <div className="flex items-center justify-between border-b pb-3">
                                    <div>
                                        <h3 className="font-extrabold text-slate-900 text-base">✏️ แก้ไขชื่อ ราคา และรูปถ่ายผักสด</h3>
                                        <p className="text-slate-500 text-xs">รหัสสินค้า: {editingProductModal.id}</p>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            setEditingProductModal(null);
                                            setProdImagePreview('');
                                            setProdImageFile(null);
                                        }} 
                                        className="w-8 h-8 bg-slate-100 rounded-full font-bold text-slate-500 hover:bg-slate-200 text-xs"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <form onSubmit={handleSaveProductDetails} className="space-y-3.5 text-xs">
                                    <div>
                                        <label className="font-extrabold text-slate-700 block mb-1">🥬 ชื่อสินค้า / ผักสด *</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={prodName}
                                            onChange={(e) => setProdName(e.target.value)}
                                            placeholder="เช่น กรีนโอ๊ค (Green Oak)"
                                            className="w-full p-2.5 border rounded-xl bg-slate-50 outline-none font-extrabold focus:border-farm-800 text-slate-900"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-2.5">
                                        <div>
                                            <label className="font-extrabold text-slate-700 block mb-1">🏷️ ราคาปลีก (฿/{editingProductModal.unit}) *</label>
                                            <input 
                                                type="number" 
                                                step="0.5"
                                                required
                                                value={prodPriceRetail}
                                                onChange={(e) => setProdPriceRetail(e.target.value)}
                                                className="w-full p-2.5 border rounded-xl bg-slate-50 font-extrabold text-farm-800 text-center outline-none focus:border-farm-800"
                                            />
                                        </div>
                                        <div>
                                            <label className="font-extrabold text-slate-700 block mb-1">⭐ ราคาส่ง (฿/{editingProductModal.unit}) *</label>
                                            <input 
                                                type="number" 
                                                step="0.5"
                                                required
                                                value={prodPriceWholesale}
                                                onChange={(e) => setProdPriceWholesale(e.target.value)}
                                                className="w-full p-2.5 border rounded-xl bg-slate-50 font-extrabold text-amber-700 text-center outline-none focus:border-farm-800"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="font-bold text-slate-700 block mb-1">📝 คำอธิบายสินค้า</label>
                                        <textarea 
                                            rows="2"
                                            value={prodDesc}
                                            onChange={(e) => setProdDesc(e.target.value)}
                                            placeholder="เช่น ผักปลอดสาร สด กรอบ เก็บสดทุกเช้า"
                                            className="w-full p-2.5 border rounded-xl bg-slate-50 text-slate-700 outline-none focus:border-farm-800"
                                        ></textarea>
                                    </div>

                                    <div className="space-y-2 pt-2 border-t">
                                        <p className="font-extrabold text-slate-800">🖼️ รูปถ่ายสินค้า:</p>
                                        <div className="relative w-36 h-36 mx-auto rounded-2xl overflow-hidden border-2 border-slate-200 shadow-sm bg-slate-50">
                                            <img 
                                                src={prodImagePreview || editingProductModal.image} 
                                                alt="Preview" 
                                                className="w-full h-full object-cover"
                                                onError={(e) => {
                                                    e.target.onerror = null;
                                                    e.target.src = getFallbackSvg(prodName || editingProductModal.name);
                                                }}
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-1.5 bg-slate-50 p-3 rounded-2xl border border-slate-200">
                                        <label className="font-bold text-slate-700 block text-[11px]">📁 อัปโหลดรูปใหม่จากมือถือ/คอมพิวเตอร์:</label>
                                        <input 
                                            type="file" 
                                            accept="image/*"
                                            onChange={(e) => {
                                                const file = e.target.files && e.target.files[0];
                                                if (file) {
                                                    setProdImageFile(file);
                                                    const reader = new FileReader();
                                                    reader.onload = (ev) => setProdImagePreview(ev.target.result);
                                                    reader.readAsDataURL(file);
                                                }
                                            }}
                                            className="w-full text-xs text-slate-500"
                                        />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="font-bold text-slate-700 block text-[11px]">หรือวางลิงก์รูปภาพ (Image URL):</label>
                                        <input 
                                            type="url" 
                                            placeholder="https://..." 
                                            value={prodImageFile ? '' : prodImagePreview}
                                            onChange={(e) => {
                                                setProdImageFile(null);
                                                setProdImagePreview(e.target.value);
                                            }}
                                            className="w-full p-2 border rounded-xl bg-slate-50 outline-none text-[11px] focus:border-farm-800"
                                        />
                                    </div>

                                    <div className="pt-2 flex gap-2">
                                        <button 
                                            type="button"
                                            onClick={() => setEditingProductModal(null)}
                                            className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-all"
                                        >
                                            ยกเลิก
                                        </button>
                                        <button 
                                            type="submit"
                                            disabled={isUploadingProdImg}
                                            className="flex-1 py-2.5 bg-farm-800 hover:bg-farm-900 text-white font-extrabold rounded-xl shadow transition-all flex items-center justify-center gap-1.5"
                                        >
                                            {isUploadingProdImg ? '⏳ กำลังบันทึก...' : '💾 บันทึกข้อมูลผัก'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 md:hidden z-20">
                        <div className="grid grid-cols-3 text-center py-2 text-[11px] font-bold">
                            <button onClick={() => setView('store')} className={`space-y-0.5 ${view === 'store' ? 'text-farm-800 font-extrabold' : 'text-slate-400'}`}>
                                <div className="text-base">🥬</div>
                                <span>สั่งผักสด</span>
                            </button>
                            <button onClick={() => setView('tracking')} className={`space-y-0.5 ${view === 'tracking' ? 'text-farm-800 font-extrabold' : 'text-slate-400'}`}>
                                <div className="text-base">🚚</div>
                                <span>ติดตาม</span>
                            </button>
                            <button onClick={() => setView('backoffice')} className={`space-y-0.5 ${view === 'backoffice' ? 'text-farm-800 font-extrabold' : 'text-slate-400'}`}>
                                <div className="text-base">👤🔧</div>
                                <span>ระบบปฏิบัติการ</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
