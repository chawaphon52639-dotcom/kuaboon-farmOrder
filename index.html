        const playAlertSound = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                [0, 0.25, 0.5, 0.75].forEach(delay => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime + delay);
                    osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + delay + 0.18);
                    
                    gain.gain.setValueAtTime(0.6, ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.22);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.23);
                });
            } catch (e) {
                console.warn("Audio Alert Error:", e);
            }
        };

        async function compressImageToBlob(fileOrDataUrl, maxWidth = 800, maxHeight = 800, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            width = maxHeight;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', quality);
                    canvas.toBlob((blob) => {
                        resolve({ blob: blob || null, dataUrl });
                    }, 'image/jpeg', quality);
                };
                img.onerror = () => reject(new Error("ไม่สามารถอ่านรูปภาพได้"));

                if (typeof fileOrDataUrl === 'string') {
                    img.src = fileOrDataUrl;
                } else if (fileOrDataUrl instanceof File || fileOrDataUrl instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = (e) => { img.src = e.target.result; };
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(fileOrDataUrl);
                } else {
                    reject(new Error("Invalid image source"));
                }
            });
        }

        async function uploadBlobToStorage(fileOrDataUrl, folderName, options = {}) {
            if (!fileOrDataUrl) return null;
            if (typeof fileOrDataUrl === 'string' && fileOrDataUrl.startsWith('http')) {
                return fileOrDataUrl;
            }

            const maxWidth = options.maxWidth || 800;
            const maxHeight = options.maxHeight || 800;
            const quality = options.quality !== undefined ? options.quality : 0.8;

            let compressedDataUrl = null;
            let blob = null;

            try {
                const compressed = await compressImageToBlob(fileOrDataUrl, maxWidth, maxHeight, quality);
                compressedDataUrl = compressed.dataUrl;
                blob = compressed.blob;
            } catch (err) {
                console.error("Compression error:", err);
                if (typeof fileOrDataUrl === 'string') return fileOrDataUrl;
                throw err;
            }

            try {
                const filename = `${folderName}/${Date.now()}_${Math.random().toString(36).substring(2, 7)}.jpg`;
                const ref = storage.ref().child(filename);
                const uploadTask = ref.put(blob, { contentType: 'image/jpeg' });
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Storage Timeout")), 3000));
                const snapshot = await Promise.race([uploadTask, timeoutPromise]);
                return await snapshot.ref.getDownloadURL();
            } catch (storageError) {
                console.warn("Storage fallback used inline DataURL:", storageError);
                return compressedDataUrl;
            }
        }

        function bahtText(num) {
            if (!num || isNaN(num) || num === 0) return 'ศูนย์บาทถ้วน';
            num = Math.round(num * 100) / 100;
            const digits = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
            const positions = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];
            
            let [baht, satang] = num.toString().split('.');
            let bahtStr = '';
            
            let len = baht.length;
            for (let i = 0; i < len; i++) {
                let digit = parseInt(baht[i]);
                let pos = len - i - 1;
                if (digit !== 0) {
                    if (pos === 1 && digit === 1) bahtStr += 'สิบ';
                    else if (pos === 1 && digit === 2) bahtStr += 'ยี่สิบ';
                    else if (pos === 0 && digit === 1 && len > 1) bahtStr += 'เอ็ด';
                    else bahtStr += digits[digit] + positions[pos % 6];
                }
            }
            bahtStr += 'บาท';
            if (!satang || parseInt(satang) === 0) {
                bahtStr += 'ถ้วน';
            } else {
                let s = parseInt(satang.padEnd(2, '0').slice(0, 2));
                if (s > 0) {
                    let ten = Math.floor(s / 10);
                    let unit = s % 10;
                    if (ten === 1) bahtStr += 'สิบ';
                    else if (ten === 2) bahtStr += 'ยี่สิบ';
                    else if (ten > 2) bahtStr += digits[ten] + 'สิบ';
                    
                    if (unit === 1 && ten > 0) bahtStr += 'เอ็ด';
                    else if (unit > 0) bahtStr += digits[unit];
                    bahtStr += 'สตางค์';
                } else {
                    bahtStr += 'ถ้วน';
                }
            }
            return bahtStr;
        }

                        () => showToast('📍 ไม่สามารถดึง GPS ได้', 'กรุณาวางลิงก์ Google Maps โดยตรงในช่องใส่พิกัด', 'error')
                    );
                }
            };

            const handlePlaceOrder = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || isSubmitting) return;

                if (isCreditOrder || customerType === 'wholesale') {
                    const isApproved = wholesaleWhitelist.some(w => w.phone.replace(/[^0-9]/g, '') === custPhone.replace(/[^0-9]/g, ''));
                    if (!isApproved && isCreditOrder) {
                        showToast('⚠️ ไม่ได้รับสิทธิ์เครดิต', 'เบอร์โทรศัพท์นี้ยังไม่ได้รับอนุมัติสั่งซื้อแบบเครดิต กรุณาเลือกชำระแบบโอนเงินก่อนครับ', 'error');
                        return;
                    }
                }

                if (!isCreditOrder && !slipPreview && !slipFile) {
                    showToast('📸 กรุณาแนบสลิป', 'กรุณาแนบรูปสลิปการโอนเงินเพื่อยืนยันการชำระเงิน', 'error');
                    return;
                }

                setIsSubmitting(true);

                try {
                    let uploadedSlipUrl = null;
                    if (slipFile || slipPreview) {
                        uploadedSlipUrl = await uploadBlobToStorage(slipFile || slipPreview, 'payment_slips');
                    }

                    // Auto Doc Numbering: 001/YYYYMMDD/2026
                    const docNum = String(orders.length + 1).padStart(3, '0');
                    const formattedDateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
                    const currentYear = new Date().getFullYear();
                    const newDocNo = `${docNum}/${formattedDateStr}/${currentYear}`;
                    const orderId = `ORD-${Date.now()}`;

                    const newOrder = {
                        id: orderId,
                        docNo: newDocNo,
                        date: new Date().toLocaleString('th-TH'),
                        customerName: custName,
                        phone: custPhone,
                        address: custAddress,
                        mapsUrl: custMapsUrl,
                        paymentType: isCreditOrder ? 'credit' : 'promptpay',
                        isCredit: isCreditOrder,
                        isWholesaleCustomer: customerType === 'wholesale',
                        items: cart.map(i => ({ id: i.id, name: i.name, qty: roundStep(i.qty), price: getItemPrice(i), unit: i.unit })),
                        subtotal: cartSubtotal,
                        shippingFee: shippingFee,
                        total: cartTotal,
                        status: 'pending',
                        slipImage: uploadedSlipUrl,
                        proofImage: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    await db.collection('orders').doc(orderId).set(newOrder);

                    // Real-time stock deduction
                    const batch = db.batch();
                    cart.forEach(cItem => {
                        const pRef = db.collection('products').doc(cItem.id);
                        const currentProd = products.find(p => p.id === cItem.id);
                        if (currentProd) {
                            const newStock = Math.max(0, roundStep(currentProd.stock - cItem.qty));
                            batch.update(pRef, { stock: newStock });
                        }
                    });
                    await batch.commit();

                    setCart([]);
                    setShowCartDrawer(false);
                    setSlipPreview('');
                    setSlipFile(null);

                    if (window.confetti) {
                        window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    }

                    setView('tracking');
                    showToast('🎉 สั่งซื้อผักสดสำเร็จ!', `ส่งรายการคำสั่งซื้อเลขที่ ${newDocNo} เข้าสู่ระบบเรียบร้อยแล้ว`, 'success');
                } catch (err) {
                    showToast('❌ เกิดข้อผิดพลาด', 'ไม่สามารถบันทึกออเดอร์ได้ กรุณาตรวจสอบสิทธิ์ Firestore/Storage Rules', 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleAttemptCancel = (order) => {
                if (order.slipImage) {
                    showToast(
                        '⛔ ไม่สามารถยกเลิกได้', 
                        'ออเดอร์นี้ได้ทำการแนบสลิปชำระเงินและตัดยอดเงินเรียบร้อยแล้ว\n\nหากต้องการยกเลิกหรือแก้ไข กรุณาติดต่อทางเกื้อบุญฟาร์มโดยตรง เพื่อป้องกันปัญหาเรื่องการคืนเงินครับ', 
                        'error'
                    );
                    return;
                }
                setCancelModalOrder(order);
            };

            const executeCancelOrder = async (order) => {
                if (!order || order.status !== 'pending') return;
                setIsSubmitting(true);
                try {
                    const batch = db.batch();
                    const orderRef = db.collection('orders').doc(order.id);
                    batch.update(orderRef, { 
                        status: 'cancelled',
                        cancelledAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    order.items.forEach(item => {
                        const pRef = db.collection('products').doc(item.id);
                        const currentProd = products.find(p => p.id === item.id);
                        if (currentProd) {
                            const newStock = roundStep((currentProd.stock || 0) + item.qty);
                            batch.update(pRef, { stock: newStock });
                        }
                    });

                    await batch.commit();
                    setCancelModalOrder(null);
                    showToast('❌ ยกเลิกออเดอร์สำเร็จ', `ยกเลิกรายการ ${order.docNo} และคืนจำนวนผักสดเข้าคลังเรียบร้อยแล้วครับ`, 'success');
                } catch (err) {
                    showToast('❌ ไม่สามารถยกเลิกได้', 'เกิดข้อผิดพลาดในการยกเลิกออเดอร์ กรุณาลองใหม่อีกครั้ง', 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const executeAdminDeleteOrder = async (order) => {
                if (!order) return;
                setIsSubmitting(true);
                try {
                    const batch = db.batch();
                    const orderRef = db.collection('orders').doc(order.id);
                    batch.delete(orderRef);

                    if (order.status !== 'cancelled' && order.items && Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            const pRef = db.collection('products').doc(item.id);
                            const currentProd = products.find(p => p.id === item.id);
                            if (currentProd) {
                                const newStock = roundStep((currentProd.stock || 0) + item.qty);
                                batch.update(pRef, { stock: newStock });
                            }
                        });
                    }

                    await batch.commit();
                    setDeleteModalOrder(null);
                    showToast('🗑️ ลบออเดอร์สำเร็จ!', `ลบคำสั่งซื้อเลขที่ ${order.docNo} และคืนผักสดเข้าสต็อกเรียบร้อยแล้ว`, 'success');
                } catch (err) {
                    console.error("Admin delete error:", err);
                    showToast('❌ ลบไม่สำเร็จ', 'เกิดข้อผิดพลาดในการลบออเดอร์ออกจากคลาวด์', 'error');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleBackofficeLogin = (e) => {
                e.preventDefault();
                if (adminPin === masterAdminPin) {
                    setUserRole('admin');
                    setActiveStaffName('ผู้ดูแลระบบ (Admin)');
                    setIsAdminLoggedIn(true);
                    setAdminPin('');
                    showToast('👑 เข้าสู่ระบบสำเร็จ', 'ยินดีต้อนรับผู้ดูแลระบบเกื้อบุญฟาร์ม', 'success');
                } else {
                    const foundStaff = staffList.find(s => s.pin === adminPin);
                    if (foundStaff) {
                        setUserRole('staff');
                        setActiveStaffName(foundStaff.name);
                        setIsAdminLoggedIn(true);
                        setAdminTab('active');
                        setAdminPin('');
                        showToast('👷 เข้าสู่ระบบพนักงาน', `ยินดีต้อนรับคุณ ${foundStaff.name}`, 'success');
                    } else {
                        showToast('🔑 รหัส PIN ไม่ถูกต้อง', 'กรุณาตรวจสอบรหัส PIN 4 หลัก (Admin PIN: 1234)', 'error');
                    }
                }
            };

            const updateOrderStatus = async (orderId, newStatus) => {
                try {
                    await db.collection('orders').doc(orderId).update({ status: newStatus });
                    showToast('✅ อัปเดตสถานะสำเร็จ', `เปลี่ยนสถานะออเดอร์เป็น "${newStatus}" เรียบร้อยแล้ว`, 'success');
                } catch (err) {
                    showToast('❌ อัปเดตไม่สำเร็จ', 'เกิดข้อผิดพลาดในการอัปเดตข้อมูล', 'error');
                }
            };

            const handleUploadProofImage = async (orderId, file) => {
                try {
                    showToast('⏳ กำลังอัปโหลดหลักฐาน...', 'กำลังย่อและบันทึกรูปภาพขึ้นคลาวด์...', 'info');
                    const uploadedUrl = await uploadBlobToStorage(file, 'delivery_proofs');
                    await db.collection('orders').doc(orderId).update({ proofImage: uploadedUrl });
                    showToast('📸 แนบหลักฐานสำเร็จ!', 'บันทึกรูปภาพหลักฐานการจัดส่งเรียบร้อยแล้ว', 'success');
                } catch (err) {
                    showToast('❌ อัปโหลดไม่สำเร็จ', 'ไม่สามารถบันทึกรูปภาพได้', 'error');
                }
            };

            const handleAddWholesaleCustomer = async (e) => {
                e.preventDefault();
                if (!newWholesaleName.trim() || !newWholesalePhone.trim()) return;

                const updatedList = [
                    ...wholesaleWhitelist,
                    { id: String(Date.now()), name: newWholesaleName.trim(), phone: newWholesalePhone.trim() }
                ];

                setWholesaleWhitelist(updatedList);
                setNewWholesaleName('');
                setNewWholesalePhone('');

                try {
                    await db.collection('settings').doc('farm_config').set({ wholesaleWhitelist: updatedList }, { merge: true });
                    showToast('✅ เพิ่มร้านค้าสำเร็จ', `ลงทะเบียนคุณ/ร้าน ${newWholesaleName} เข้าระบบลูกค้าราคาส่งเรียบร้อยแล้ว`, 'success');
                } catch (err) {
                    showToast('❌ บันทึกไม่สำเร็จ', 'เกิดข้อผิดพลาดในการบันทึกข้อมูลลงคลาวด์', 'error');
                }
            };

            const handleDeleteWholesaleCustomer = async (id) => {
                const updatedList = wholesaleWhitelist.filter(w => w.id !== id);
                setWholesaleWhitelist(updatedList);
                try {
                    await db.collection('settings').doc('farm_config').set({ wholesaleWhitelist: updatedList }, { merge: true });
                    showToast('🗑️ ลบรายชื่อเรียบร้อย', 'ลบร้านค้าออกจากระบบสิทธิ์ราคาส่งแล้ว', 'info');
                } catch (err) {}
            };

            const handleSaveFarmSettings = async (e) => {
                e.preventDefault();
                setIsSavingSettings(true);
                try {
                    let qrUrl = customQrImage;
                    if (customQrFile || (customQrImage && customQrImage.startsWith('data:'))) {
                        qrUrl = await uploadBlobToStorage(customQrFile || customQrImage, 'farm_settings', { maxWidth: 1200, maxHeight: 1200, quality: 0.98 });
                    }

                    const settingsData = {
                        farmName, taxId, farmAddress, farmPhone, promptpayNo, bankAccountNo,
                        customQrImage: qrUrl, masterAdminPin, staffList, wholesaleWhitelist,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    await db.collection('settings').doc('farm_config').set(settingsData, { merge: true });
                    showToast('💾 บันทึกตั้งค่าสำเร็จ', 'ข้อมูลฟาร์มและรายชื่อลูกค้าราคาส่งอัปเดตขึ้นคลาวด์เรียบร้อยแล้ว', 'success');
                } catch (err) {
                    showToast('❌ บันทึกไม่สำเร็จ', 'กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือสิทธิ์ Firebase Rules', 'error');
                } finally {
                    setIsSavingSettings(false);
                }
            };

            const handleExportCSV = () => {
                if (orders.length === 0) {
                    showToast('⚠️ ไม่มีข้อมูล', 'ยังไม่มีข้อมูลออเดอร์สำหรับส่งออกเป็นไฟล์ CSV', 'info');
                    return;
                }
                let csvContent = "\uFEFF";
                csvContent += "เลขที่เอกสาร,วันที่,ชื่อลูกค้า,เบอร์โทรศัพท์,ยอดเงินรวม,ประเภทการชำระ,ชนิดเอกสาร,สถานะ\n";
                orders.forEach(o => {
                    const docType = (o.isCredit || o.isWholesaleCustomer) ? 'ใบส่งสินค้า' : 'ใบเสร็จรับเงิน';
                    csvContent += `"${o.docNo}","${o.date}","${o.customerName}","${o.phone}","${o.total}","${o.isCredit ? 'เครดิต' : 'สด/โอน'}","${docType}","${o.status}"\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.setAttribute('download', `Kuaboon_Orders_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('📥 ส่งออก CSV สำเร็จ', 'ดาวน์โหลดไฟล์รายงานยอดขายเรียบร้อยแล้ว', 'success');
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 pb-20 md:pb-8">
                    {/* Top Bar Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('store')}>
                                <div className="w-10 h-10 bg-farm-800 text-white rounded-2xl flex items-center justify-center font-bold text-xl shadow-md shadow-farm-800/30">
                                    🥬
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-slate-900 text-base sm:text-lg leading-tight">{farmName}</h1>
                                    <p className="text-[11px] text-slate-500 font-medium">ผักปลอดสารสดจากแปลง ปลูกด้วยความใส่ใจ</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <button
                                    type="button"
                                    onClick={() => {
                                        playAlertSound();
                                        showToast('🔊 ทดสอบเสียงเตือน', 'เล่นเสียงสัญญาณเตือนออเดอร์ใหม่เรียบร้อยแล้วครับ!', 'success');
                                    }}
                                    className="px-2.5 py-1.5 rounded-full text-[11px] font-bold bg-amber-100 text-amber-900 hover:bg-amber-200 transition-all border border-amber-300 flex items-center gap-1"
                                >
                                    <span>🔊</span>
                                    <span className="hidden sm:inline">ทดสอบเสียง</span>
                                </button>

                                <button 
                                    type="button"
                                    onClick={() => showToast(
                                        isFirebaseConnected ? '🟢 เชื่อมต่อคลาวด์ Firebase แล้ว' : '🔴 ยังไม่พบการเชื่อมต่อ Firestore',
                                        isFirebaseConnected ? 'ระบบเชื่อมต่อโปรเจกต์ orderkueaboon สำเร็จเรียบร้อย ออเดอร์และสต็อกจะซิงค์สดๆ ทันที' : 'ไปที่ Firebase Console ตั้งค่า Firestore Rules เป็น allow read, write: if true;',
                                        isFirebaseConnected ? 'success' : 'error'
                                    )}
                                    className={`px-3 py-1.5 rounded-full text-[11px] font-bold flex items-center gap-1.5 transition-all shadow-sm ${
                                        isFirebaseConnected ? 'bg-emerald-50 text-emerald-800 border border-emerald-300 hover:bg-emerald-100' : 'bg-rose-50 text-rose-800 border border-rose-300 hover:bg-rose-100 animate-pulse'
                                    }`}
                                >
                                    <span className="relative flex h-2 w-2">
                                        <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isFirebaseConnected ? 'bg-emerald-400' : 'bg-rose-400'}`}></span>
                                        <span className={`relative inline-flex rounded-full h-2 w-2 ${isFirebaseConnected ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                    </span>
                                    <span>{isFirebaseConnected ? 'Firebase 🟢' : 'Firebase 🔴'}</span>
                                </button>

                                <div className="hidden md:flex items-center gap-2">
                                    <button onClick={() => setView('store')} className={`px-4 py-2 rounded-2xl font-bold text-xs transition-all ${view === 'store' ? 'bg-farm-800 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>🛒 หน้าร้านสั่งผัก</button>
                                    <button onClick={() => setView('tracking')} className={`px-4 py-2 rounded-2xl font-bold text-xs transition-all ${view === 'tracking' ? 'bg-farm-800 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>🚚 ติดตามออเดอร์</button>
                                    <button onClick={() => setView('backoffice')} className={`px-4 py-2 rounded-2xl font-bold text-xs transition-all ${view === 'backoffice' ? 'bg-farm-800 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>👤🔧 หลังบ้าน / ปฏิบัติการ</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Notification Toast Modal */}
                    {toastModal.show && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-2xl border text-center">
                                <div className={`w-14 h-14 rounded-2xl mx-auto flex items-center justify-center text-2xl font-bold ${toastModal.type === 'success' ? 'bg-emerald-100 text-emerald-800' : toastModal.type === 'error' ? 'bg-rose-100 text-rose-800' : 'bg-blue-100 text-blue-800'}`}>
                                    {toastModal.type === 'success' ? '✅' : toastModal.type === 'error' ? '❌' : '💡'}
                                </div>
                                <div className="space-y-1">
                                    <h3 className="font-extrabold text-slate-900 text-base">{toastModal.title}</h3>
                                    <p className="text-slate-600 text-xs leading-relaxed whitespace-pre-line text-left bg-slate-50 p-3 rounded-xl border">{toastModal.message}</p>
                                </div>
                                <button onClick={() => setToastModal({ ...toastModal, show: false })} className="w-full py-2.5 bg-slate-900 text-white rounded-xl font-bold text-xs shadow hover:bg-slate-800">ตกลง / ปิดหน้าต่าง</button>
                            </div>
                        </div>
                    )}

                    {/* Order Cancellation Confirmation Modal */}
                    {cancelModalOrder && (
                        <div className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-2xl border text-center">
                                <div className="w-14 h-14 bg-rose-100 text-rose-600 rounded-2xl mx-auto flex items-center justify-center text-2xl font-bold">⚠️</div>
                                <div className="space-y-1">
                                    <h3 className="font-extrabold text-slate-900 text-base">ยืนยันการยกเลิกออเดอร์?</h3>
                                    <p className="text-slate-600 text-xs bg-rose-50 p-3 rounded-xl border border-rose-100 text-left">
                                        คำสั่งซื้อเลขที่ <strong>{cancelModalOrder.docNo}</strong> จะถูกยกเลิก และระบบจะ <strong>คืนผักสดเข้าสต็อกให้อัตโนมัติ</strong> ครับ
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setCancelModalOrder(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold text-xs hover:bg-slate-200">ไม่ยกเลิก</button>
                                    <button onClick={() => executeCancelOrder(cancelModalOrder)} disabled={isSubmitting} className="flex-1 py-2.5 bg-rose-600 text-white rounded-xl font-bold text-xs hover:bg-rose-700 shadow">{isSubmitting ? '⏳ กำลังยกเลิก...' : '❌ ยืนยันยกเลิก'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Delete Order Confirmation Modal */}
                    {deleteModalOrder && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-2xl border text-center">
                                <div className="w-14 h-14 bg-rose-600 text-white rounded-2xl mx-auto flex items-center justify-center text-2xl font-bold shadow-lg">🗑️</div>
                                <div className="space-y-1">
                                    <h3 className="font-extrabold text-slate-900 text-base">👑 [ผู้บริหาร] ยืนยันลบออเดอร์ถาวร?</h3>
                                    <div className="text-slate-600 text-xs bg-rose-50 p-3 rounded-xl border border-rose-200 text-left space-y-1">

                                                                }} className="text-rose-500 font-bold hover:underline">ลบ</button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {(adminTab === 'active' || adminTab === 'completed') && (
                                            <div className="space-y-4">
                                                {orders.filter(o => adminTab === 'completed' ? o.status === 'completed' : o.status !== 'completed').map(order => {
                                                    const isDeliveryNote = order.isCredit || order.isWholesaleCustomer;
                                                    return (
                                                        <div key={order.id} className="bg-white p-4 sm:p-5 rounded-3xl border border-slate-200 shadow-sm space-y-3">
                                                            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 border-b pb-3">
                                                                <div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="font-extrabold text-slate-900 text-sm">{order.docNo}</span>
                                                                        <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${order.isCredit ? 'bg-amber-100 text-amber-800' : 'bg-emerald-100 text-emerald-800'}`}>
                                                                            {order.isCredit ? 'เครดิต' : 'จ่ายสด/โอน'}
                                                                        </span>
                                                                    </div>
                                                                    <p className="text-slate-400 text-[11px]">{order.date} • คุณ {order.customerName} ({order.phone})</p>
                                                                </div>

                                                                <div className="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                                                                    <select value={order.status} onChange={e => updateOrderStatus(order.id, e.target.value)} className="text-xs p-2 border border-slate-300 rounded-xl font-bold bg-slate-50 outline-none">
                                                                        <option value="pending">⏳ ได้รับออเดอร์</option>
                                                                        <option value="packing">🥬 กำลังแพ็คผักสด</option>
                                                                        <option value="shipping">🚚 กำลังจัดส่ง</option>
                                                                        <option value="completed">✅ ส่งสำเร็จแล้ว</option>
                                                                    </select>

                                                                    <button onClick={() => setSelectedOrderDetails(order)} className={`px-3.5 py-2 text-white text-xs font-black rounded-xl shadow flex items-center gap-1.5 ${isDeliveryNote ? 'bg-amber-600 hover:bg-amber-700' : 'bg-emerald-700 hover:bg-emerald-800'}`}>
                                                                        <span>📄</span>
                                                                        <span>{isDeliveryNote ? 'ออกใบส่งของ (A4)' : 'ออกใบเสร็จรับเงิน (A4)'}</span>
                                                                    </button>

                                                                    {userRole === 'admin' && (
                                                                        <button onClick={() => setDeleteModalOrder(order)} className="px-3 py-2 bg-rose-50 border border-rose-200 hover:bg-rose-100 text-rose-700 font-extrabold text-xs rounded-xl transition-all whitespace-nowrap">
                                                                            🗑️ ลบออเดอร์
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>

                                                            <div className="text-xs space-y-1">
                                                                {order.items && order.items.map((it, idx) => (
                                                                    <div key={idx} className="flex justify-between text-slate-600">
                                                                        <span>• {it.name} x {it.qty} {it.unit}</span>
                                                                        <span>฿{it.price * it.qty}</span>
                                                                    </div>
                                                                ))}
                                                                <div className="flex justify-between font-extrabold text-slate-900 pt-1 border-t">
                                                                    <span>ยอดเงินรวม</span>
                                                                    <span className="text-farm-800">฿{order.total}</span>
                                                                </div>
                                                            </div>

                                                            {order.address && (
                                                                <p className="text-[11px] text-slate-500 bg-slate-50 p-2 rounded-xl">
                                                                    📍 <strong>ที่อยู่ส่ง:</strong> {order.address} {order.mapsUrl && <a href={order.mapsUrl} target="_blank" rel="noreferrer" className="text-blue-600 underline ml-1">เปิดแผนที่</a>}
                                                                </p>
                                                            )}

                                                            <div className="pt-2 border-t flex flex-col sm:flex-row items-center justify-between gap-2 text-xs">
                                                                <div className="w-full sm:w-auto">
                                                                    <label className="font-bold text-slate-700 block mb-0.5">📸 อัปโหลดรูปหลักฐานการจัดส่ง:</label>
                                                                    <input type="file" accept="image/*" onChange={e => {
                                                                        if (e.target.files && e.target.files[0]) {
                                                                            handleUploadProofImage(order.id, e.target.files[0]);
                                                                        }
                                                                    }} className="text-[10px] text-slate-500" />
                                                                </div>
                                                                {order.slipImage && (
                                                                    <a href={order.slipImage} target="_blank" rel="noreferrer" className="text-blue-600 font-bold hover:underline text-[11px]">🖼️ ดูสลิปโอนเงินลูกค้า</a>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {selectedOrderDetails && (
                        <div className="fixed inset-0 z-50 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-2 sm:p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-3xl rounded-3xl p-6 sm:p-8 space-y-6 shadow-2xl my-auto">
                                <div className="flex justify-between items-center no-print border-b pb-3">
                                    <h3 className="font-extrabold text-slate-900 text-base">
                                        📄 ตัวอย่างเอกสาร A4 ({(selectedOrderDetails.isCredit || selectedOrderDetails.isWholesaleCustomer) ? 'ใบส่งสินค้า / ใบแจ้งหนี้' : 'ใบเสร็จรับเงิน'})
                                    </h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => window.print()} className="px-4 py-2 bg-farm-800 text-white font-bold text-xs rounded-xl shadow">🖨️ พิมพ์ / บันทึก PDF</button>
                                        <button onClick={() => setSelectedOrderDetails(null)} className="px-3 py-2 bg-slate-200 text-slate-700 font-bold text-xs rounded-xl hover:bg-slate-300">ปิด</button>
                                    </div>
                                </div>

                                <div id="printable-area" className="space-y-6 text-slate-800 text-xs">
                                    {/* Company Header */}
                                    <div className="flex justify-between items-start border-b-2 border-slate-900 pb-4">
                                        <div>
                                            <h1 className="text-xl font-extrabold text-slate-900">{farmName}</h1>
                                            <p className="mt-1">{farmAddress}</p>
                                            <p>โทร: {farmPhone} | เลขประจำตัวผู้เสียภาษี: {taxId}</p>
                                        </div>
                                        <div className="text-right">
                                            <h2 className="text-lg font-black text-slate-900">
                                                {(selectedOrderDetails.isCredit || selectedOrderDetails.isWholesaleCustomer) ? 'ใบส่งสินค้า / ใบแจ้งหนี้' : 'ใบเสร็จรับเงิน'}
                                            </h2>
                                            <p className="font-mono font-bold mt-1 text-slate-600">เลขที่: {selectedOrderDetails.docNo}</p>
                                            <p className="text-[11px] text-slate-500">วันที่: {selectedOrderDetails.date}</p>
                                        </div>
                                    </div>

                                    {/* Customer Header */}
                                    <div className="bg-slate-50 p-3 rounded-xl space-y-1">
                                        <p><strong>ชื่อลูกค้า / ร้านค้า:</strong> คุณ {selectedOrderDetails.customerName}</p>
                                        <p><strong>เบอร์โทรศัพท์:</strong> {selectedOrderDetails.phone}</p>
                                        <p><strong>ที่อยู่จัดส่ง:</strong> {selectedOrderDetails.address}</p>
                                    </div>

                                    {/* Items Table */}
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b-2 border-slate-300 bg-slate-100">
                                                <th className="py-2 px-2">ลำดับ</th>
                                                <th className="py-2 px-2">รายการผักปลอดสาร / สินค้า</th>
                                                <th className="py-2 px-2 text-center">จำนวน</th>
                                                <th className="py-2 px-2 text-right">ราคา/หน่วย</th>
                                                <th className="py-2 px-2 text-right">จำนวนเงิน</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {selectedOrderDetails.items && selectedOrderDetails.items.map((it, idx) => (
                                                <tr key={idx}>
                                                    <td className="py-2 px-2 text-center">{idx + 1}</td>
                                                    <td className="py-2 px-2 font-bold">{it.name}</td>
                                                    <td className="py-2 px-2 text-center">{it.qty} {it.unit}</td>
                                                    <td className="py-2 px-2 text-right">฿{it.price}</td>
                                                    <td className="py-2 px-2 text-right font-bold">฿{it.price * it.qty}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot>
                                            <tr className="border-t-2 border-slate-900 font-bold">
                                                <td colSpan="4" className="py-2 px-2 text-right">ยอดเงินสุทธิ:</td>
                                                <td className="py-2 px-2 text-right text-base">฿{selectedOrderDetails.total}</td>
                                            </tr>
                                        </tfoot>
                                    </table>

                                    <div className="bg-slate-100 p-2.5 rounded-xl text-center font-bold">({bahtText(selectedOrderDetails.total)})</div>

                                    {/* Signature Section */}
                                    <div className="grid grid-cols-3 gap-4 pt-10 text-center">
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">{(selectedOrderDetails.isCredit || selectedOrderDetails.isWholesaleCustomer) ? 'ผู้รับสินค้า / ลูกค้า' : 'ผู้จ่ายเงิน / ลูกค้า'}<br/><span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span></p>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">พนักงานจัดส่งสินค้า<br/><span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span></p>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="border-b border-dashed border-slate-400 w-4/5 mx-auto"></div>
                                            <p className="text-[11px] font-bold">{(selectedOrderDetails.isCredit || selectedOrderDetails.isWholesaleCustomer) ? 'ผู้ส่งสินค้า / เกื้อบุญฟาร์ม' : 'ผู้รับเงิน / เกื้อบุญฟาร์ม'}<br/><span className="text-[10px] text-slate-400 font-normal">วันที่ ...../...../..........</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Mobile Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 md:hidden z-20">
                        <div className="grid grid-cols-3 text-center py-2 text-[11px] font-bold">
                            <button onClick={() => setView('store')} className={`space-y-0.5 ${view === 'store' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">🥬</div>
                                <span>สั่งผักสด</span>
                            </button>
                            <button onClick={() => setView('tracking')} className={`space-y-0.5 ${view === 'tracking' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">🚚</div>
                                <span>ติดตาม</span>
                            </button>
                            <button onClick={() => setView('backoffice')} className={`space-y-0.5 ${view === 'backoffice' ? 'text-farm-800' : 'text-slate-400'}`}>
                                <div className="text-base">👤🔧</div>
                                <span>ปฏิบัติการ</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
